<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA旅行 2026</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:10px;
}

.app{max-width:420px;margin:0 auto;}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.title{
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.item{margin-bottom:14px;}

.en{font-weight:700;font-size:16px;}

.actions{margin-top:6px;}

.btn{
  display:inline-block;
  margin:2px 4px 0 0;
  padding:6px 10px;
  font-size:13px;
  font-weight:700;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
}

.map{background:#378ADD;}
.route{background:#1D9E75;}
.uber{background:#000;}

.distance{
  font-size:12px;
  color:#666;
  margin-top:4px;
}
</style>
</head>

<body>
<div class="app">

<div class="card">
<div class="title">4/28 ダウンタウン</div>

<div class="item" data-lat="34.0544" data-lng="-118.2509">
<div class="en">The Broad</div>
<div class="actions">
<a class="btn map" href="https://maps.google.com/?q=The+Broad+Los+Angeles">📍地図</a>
<a class="btn route" onclick="route(34.0544,-118.2509)">🚗ナビ</a>
<a class="btn uber" href="https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=34.0544&dropoff[longitude]=-118.2509">🚕Uber</a>
</div>
<div class="distance">距離: 計算中...</div>
</div>

<div class="item" data-lat="34.0739" data-lng="-118.2400">
<div class="en">Dodger Stadium</div>
<div class="actions">
<a class="btn map" href="https://maps.google.com/?q=Dodger+Stadium">📍地図</a>
<a class="btn route" onclick="route(34.0739,-118.2400)">🚗ナビ</a>
<a class="btn uber" href="https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=34.0739&dropoff[longitude]=-118.2400">🚕Uber</a>
</div>
<div class="distance">距離: 計算中...</div>
</div>

</div>

<div class="card">
<div class="title">4/30 ディズニー</div>

<div class="item" data-lat="33.8054" data-lng="-117.9189">
<div class="en">Disney California Adventure</div>
<div class="actions">
<a class="btn map" href="https://maps.google.com/?q=Disney+California+Adventure+Park">📍地図</a>
<a class="btn route" onclick="route(33.8054,-117.9189)">🚗ナビ</a>
<a class="btn uber" href="https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=33.8054&dropoff[longitude]=-117.9189">🚕Uber</a>
</div>
<div class="distance">距離: 計算中...</div>
</div>

</div>

<div class="card">
<div class="title">5/3 サンタモニカ</div>

<div class="item" data-lat="34.0094" data-lng="-118.4973">
<div class="en">Santa Monica Pier</div>
<div class="actions">
<a class="btn map" href="https://maps.google.com/?q=Santa+Monica+Pier">📍地図</a>
<a class="btn route" onclick="route(34.0094,-118.4973)">🚗ナビ</a>
<a class="btn uber" href="https://m.uber.com/ul/?action=setPickup&dropoff[latitude]=34.0094&dropoff[longitude]=-118.4973">🚕Uber</a>
</div>
<div class="distance">距離: 計算中...</div>
</div>

</div>

</div>

<script>
// ナビ（現在地→目的地）
function route(lat,lng){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
}

// 距離計算
navigator.geolocation.getCurrentPosition(pos=>{
  const userLat = pos.coords.latitude;
  const userLng = pos.coords.longitude;

  document.querySelectorAll('.item').forEach(el=>{
    const lat = parseFloat(el.dataset.lat);
    const lng = parseFloat(el.dataset.lng);

    const d = distance(userLat,userLng,lat,lng);
    el.querySelector('.distance').innerText = `距離: ${d.toFixed(1)} km`;
  });
});

// 距離関数
function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
</script>

</body>
</html>
